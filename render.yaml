databases:
  - name: orelens-db
    plan: free

services:
  - type: web
    name: orelens-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.api
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: orelens-db
          property: connectionString
      - key: SEED_ON_START
        value: "1"
      - key: FMP_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

  - type: web
    name: orelens-web
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.web
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://orelens-api.onrender.com
