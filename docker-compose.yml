services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: orelens
      POSTGRES_PASSWORD: orelens
      POSTGRES_DB: orelens
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://orelens:orelens@db:5432/orelens
      FMP_API_KEY: ${FMP_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports: ["8000:8000"]
    depends_on: [db]

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports: ["3000:3000"]
    depends_on: [backend]

volumes:
  pgdata:
